{{- if (include "kamaji.isEnabled" $) }}
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  labels:
    app.kubernetes.io/managed-by: kyverno-policy-operator
    {{- include "cluster.labels.common.all" $  | nindent 4 }}
  name: {{ include "cluster.resource.name" $ }}-kamaji
  namespace: policy-exceptions
spec:
  background: true
  exceptions:
  - policyName: disallow-capabilities-strict
    ruleNames:
    - autogen-require-drop-all
    - require-drop-all
  - policyName: disallow-privilege-escalation
    ruleNames:
    - autogen-privilege-escalation
    - privilege-escalation
  - policyName: require-run-as-nonroot
    ruleNames:
    - autogen-run-as-non-root
    - run-as-non-root
  - policyName: restrict-seccomp-strict
    ruleNames:
    - autogen-check-seccomp-strict
    - check-seccomp-strict
  match:
    any:
    - resources:
        kinds:
        - Deployment
        - Pod
        - ReplicaSet
        selector:
          matchLabels:
            kamaji.clastix.io/name: {{ include "cluster.resource.name" $ }}
        namespaces:
        - {{ $.Release.Namespace }}
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  annotations:
    "helm.sh/hook-weight": "-10"
  labels:
    app.kubernetes.io/managed-by: kyverno-policy-operator
    {{- include "cluster.labels.common.all" $  | nindent 4 }}
  name: {{ include "cluster.resource.name" $ }}-kamaji-etcd
  namespace: policy-exceptions
spec:
  background: true
  exceptions:
  - policyName: disallow-capabilities-strict
    ruleNames:
    - autogen-require-drop-all
    - require-drop-all
  - policyName: disallow-privilege-escalation
    ruleNames:
    - autogen-privilege-escalation
    - privilege-escalation
  - policyName: require-run-as-nonroot
    ruleNames:
    - autogen-run-as-non-root
    - run-as-non-root
  - policyName: restrict-seccomp-strict
    ruleNames:
    - autogen-check-seccomp-strict
    - check-seccomp-strict
  match:
    any:
    - resources:
        kinds:
        - Pod
        - Job
        names:
        - {{ include "cluster.resource.name" $ }}-kamaji-etcd-etcd-*"
        namespaces:
        - {{ .Release.Namespace }}
{{- end }}
