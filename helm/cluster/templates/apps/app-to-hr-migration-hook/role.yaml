{{- if $.Values.providerIntegration.apps }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cluster.resource.name" $ }}-migrate-apps
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cluster.labels.common.all" $ | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
# Read the cluster's WC kubeconfig at the start of the hook script.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames:
  - {{ include "cluster.resource.name" $ }}-kubeconfig
# Phase D needs to poll the bundle helm release secrets in this namespace
# to confirm chart-operator-MC's `helm uninstall` actually finished before
# the hook exits. Helm release secrets are named
# `sh.helm.release.v1.<release-name>.v<rev>` and live in the same namespace
# as the App CR (org-<org>).
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: ["application.giantswarm.io"]
  resources: ["apps"]
  verbs: ["get", "list", "patch", "delete", "deletecollection"]
# Phase A/B/C/C.5 also neutralize bundle-rendered HelmReleases on the MC
# (specifically, aws-nth-bundle's inner HRs — see $SUB_HR_SELECTOR in
# job.yaml). Without these verbs, those HRs leak into Phase D's bundle
# helm uninstall and Flux helm-controller's finalizer fires `helm uninstall`
# on the managed WC release, causing the Round 68 regression.
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources: ["helmreleases"]
  verbs: ["get", "list", "patch", "delete", "deletecollection"]
{{- end }}
