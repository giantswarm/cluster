{{- if $.Values.providerIntegration.apps }}
# Bind the hook's ServiceAccount to the cluster-wide app-operator-chart
# ClusterRole, which already grants the chart verbs we need (get/list/patch/
# delete/deletecollection on application.giantswarm.io/charts) cluster-wide.
#
# We tried adding a Role + RoleBinding in the giantswarm namespace instead,
# but the user that helm runs as (system:serviceaccount:default:automation
# in this graveler MC) does not have permission to delete Roles in the
# giantswarm namespace, so the `before-hook-creation` hook-delete-policy
# failed on every retry. Binding to an EXISTING ClusterRole sidesteps that:
# we only create/delete a ClusterRoleBinding, which the helm-running SA
# does have permission for.
#
# This grants the hook's SA chart access on every cluster's namespace, but
# (a) the hook only operates on charts named for its own cluster, and
# (b) the binding is cleaned up at hook-succeeded / before-hook-creation
# of the next run.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cluster.resource.name" $ }}-migrate-apps-charts
  labels:
    {{- include "cluster.labels.common.all" $ | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: app-operator-chart
subjects:
- kind: ServiceAccount
  name: {{ include "cluster.resource.name" $ }}-migrate-apps
  namespace: {{ $.Release.Namespace }}
{{- end }}
