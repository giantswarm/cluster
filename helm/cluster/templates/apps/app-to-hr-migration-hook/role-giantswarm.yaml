{{- if $.Values.providerIntegration.apps }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cluster.resource.name" $ }}-migrate-apps-giantswarm
  namespace: giantswarm
  labels:
    {{- include "cluster.labels.common.all" $ | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
# Phase A pauses, Phase B strips finalizers, and Phase D deletes the bundle
# Chart CRs (security-bundle, observability-bundle, aws-nth-bundle) on the MC.
# These Chart CRs live in the `giantswarm` namespace, which is different from
# the cluster's organization namespace (where the hook's primary Role lives).
# Without this cross-namespace Role + RoleBinding, every kubectl operation on
# bundle Chart CRs in `giantswarm` was silently RBAC-denied (we used
# `2>/dev/null || true` so denials weren't visible), leading the hook to skip
# bundle protection while still triggering chart-operator-MC's helm uninstall
# path on the bundle release.
rules:
- apiGroups: ["application.giantswarm.io"]
  resources: ["charts"]
  verbs: ["get", "list", "patch", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cluster.resource.name" $ }}-migrate-apps-giantswarm
  namespace: giantswarm
  labels:
    {{- include "cluster.labels.common.all" $ | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cluster.resource.name" $ }}-migrate-apps-giantswarm
subjects:
- kind: ServiceAccount
  name: {{ include "cluster.resource.name" $ }}-migrate-apps
  namespace: {{ $.Release.Namespace }}
{{- end }}
