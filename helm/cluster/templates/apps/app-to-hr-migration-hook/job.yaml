{{/*
Pre-upgrade hook to safely migrate default apps from App CRs to HelmReleases.

Discovers default apps and bundle sub-apps dynamically via labels.
Customer-installed Apps and Charts are left untouched.

  - Direct default apps:    have release.giantswarm.io/version, version!=0.0.0
  - Bundle App CRs:         have release.giantswarm.io/version, version=0.0.0
  - Bundle sub-App CRs:     have app.kubernetes.io/managed-by=Helm
                            (rendered by the bundle helm chart) and
                            do NOT have release.giantswarm.io/version

Phases:
  0: Strip depends-on annotations from default App CRs.
  1: Pause + strip finalizers + delete direct default App CRs in MC.
  2: Pause + strip finalizers + delete bundle sub-App CRs in MC.
  3: Pause + strip finalizers + delete WC Chart CRs (direct + sub-app).
  4: Delete bundle App CRs and wait for cascade.

After phases 1-3, no MC App CR or WC Chart CR exists for any direct default
app or sub-app. Phase 4's cascade triggers helm uninstall on each bundle
release in the MC. That helm uninstall fires DELETE on the sub-App CRs the
bundle rendered — they're already gone, so it's a no-op. The underlying WC
helm releases are never touched, leaving them adoptable by the new
HelmRelease objects from the upgraded cluster chart.
*/}}
{{- if $.Values.providerIntegration.apps }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cluster.resource.name" $ }}-migrate-apps-to-helmreleases
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cluster.labels.common.all" $ | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "cluster.labels.common.all" $ | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cluster.resource.name" $ }}-migrate-apps
      restartPolicy: Never
      containers:
      - name: kubectl
        image: gsoci.azurecr.io/giantswarm/kubectl:{{ .Values.providerIntegration.kubernetesVersion }}
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 512Mi
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          CLUSTER_NAME="{{ include "cluster.resource.name" $ }}"
          NAMESPACE="{{ $.Release.Namespace }}"
          CHART_NAMESPACE="giantswarm"
          BATCH_SIZE=10

          # Fetch WC kubeconfig
          echo "Fetching WC kubeconfig for $CLUSTER_NAME"
          kubectl get secret -n "$NAMESPACE" "${CLUSTER_NAME}-kubeconfig" \
            -o jsonpath='{.data.value}' | base64 -d > /tmp/wc-kubeconfig
          WC="--kubeconfig /tmp/wc-kubeconfig"

          # Label selectors
          DEFAULT_APP_LABEL="release.giantswarm.io/version"
          HELM_MANAGED_LABEL="app.kubernetes.io/managed-by=Helm"
          EXCLUDE_OPERATORS="app.kubernetes.io/name notin (app-operator,chart-operator)"

          # Direct default apps: tagged with the release label and version != 0.0.0
          # (the !=0.0.0 condition excludes bundle App CRs, which carry version=0.0.0).
          NON_BUNDLE_SELECTOR="giantswarm.io/cluster=$CLUSTER_NAME,app-operator.giantswarm.io/version!=0.0.0,$EXCLUDE_OPERATORS,$DEFAULT_APP_LABEL"
          # Bundle sub-Apps: rendered by helm (managed-by=Helm) and lack the
          # release label (only direct defaults and bundles have it).
          SUB_APP_SELECTOR="giantswarm.io/cluster=$CLUSTER_NAME,$HELM_MANAGED_LABEL,!$DEFAULT_APP_LABEL,$EXCLUDE_OPERATORS"
          # Discovery selectors used by Phase 0 and Phase 4.
          CLUSTER_SELECTOR="giantswarm.io/cluster=$CLUSTER_NAME,$DEFAULT_APP_LABEL"

          # WC Chart CRs:
          #   - Direct default apps' Chart CRs carry the release label.
          #   - Sub-app Chart CRs carry app.kubernetes.io/managed-by=Helm
          #     (copied through from the helm-rendered MC sub-App CR).
          WC_CHART_DIRECT_SELECTOR="$DEFAULT_APP_LABEL"
          WC_CHART_SUBAPP_SELECTOR="$HELM_MANAGED_LABEL,$EXCLUDE_OPERATORS"

          # Helper: check if an app is an operator that must be kept alive.
          is_operator() {
            case "$1" in *-app-operator|*-chart-operator) return 0 ;; esac
            return 1
          }

          # Helper: pause + strip finalizers + delete a set of MC App CRs
          # selected by label. Mirrors the b76ca37 sequence for non-bundle Apps.
          # Args: $1=phase id (e.g. "1" or "2"), $2=description, $3=selector
          neutralize_apps_in_mc() {
            PHASE_ID="$1"
            DESC="$2"
            SEL="$3"

            echo "Phase ${PHASE_ID}a: Pausing $DESC"
            kubectl annotate apps.application.giantswarm.io -n "$NAMESPACE" \
              -l "$SEL" \
              "operatorkit.giantswarm.io/paused=true" --overwrite

            echo "Phase ${PHASE_ID}b: Removing finalizers from $DESC"
            APPS=$(kubectl get apps.application.giantswarm.io -n "$NAMESPACE" \
              -l "$SEL" \
              -o jsonpath='{.items[*].metadata.name}')
            COUNT=0
            for APP in $APPS; do
              # Individual patches may fail if the app has no finalizers — that's OK.
              (kubectl patch apps.application.giantswarm.io "$APP" -n "$NAMESPACE" --type=json \
                -p='[{"op": "remove", "path": "/metadata/finalizers"}]' 2>/dev/null || true) &
              COUNT=$((COUNT + 1))
              if [ $((COUNT % BATCH_SIZE)) -eq 0 ]; then wait; fi
            done
            wait

            echo "Phase ${PHASE_ID}c: Deleting $DESC"
            kubectl delete apps.application.giantswarm.io -n "$NAMESPACE" \
              -l "$SEL" \
              --ignore-not-found=true --wait=false
          }

          # Helper: pause + strip finalizers + delete WC Chart CRs by label.
          # Args: $1=description, $2=selector
          neutralize_charts_in_wc() {
            DESC="$1"
            SEL="$2"

            echo "  Pausing $DESC"
            kubectl $WC annotate chart -n "$CHART_NAMESPACE" \
              -l "$SEL" \
              "operatorkit.giantswarm.io/paused=true" --overwrite

            echo "  Removing finalizers from $DESC"
            CHARTS=$(kubectl $WC get chart -n "$CHART_NAMESPACE" \
              -l "$SEL" \
              -o jsonpath='{.items[*].metadata.name}')
            COUNT=0
            for CHART in $CHARTS; do
              (kubectl $WC patch chart "$CHART" -n "$CHART_NAMESPACE" --type=json \
                -p='[{"op": "remove", "path": "/metadata/finalizers"}]' 2>/dev/null || true) &
              COUNT=$((COUNT + 1))
              if [ $((COUNT % BATCH_SIZE)) -eq 0 ]; then wait; fi
            done
            wait

            echo "  Deleting $DESC"
            kubectl $WC delete chart -n "$CHART_NAMESPACE" \
              -l "$SEL" \
              --ignore-not-found=true
          }

          # ============================================================
          # Phase 0: Remove dependency annotations
          # ============================================================
          # Prevents app-operator from pausing MC Chart CRs in reaction to
          # dependency App CRs being removed in subsequent phases.
          echo "Phase 0: Removing depends-on annotations from default App CRs"
          kubectl annotate apps.application.giantswarm.io -n "$NAMESPACE" \
            -l "$CLUSTER_SELECTOR" \
            "app-operator.giantswarm.io/depends-on-"

          # ============================================================
          # Phase 1: Direct (non-bundle) default App CRs in MC
          # ============================================================
          neutralize_apps_in_mc "1" "non-bundle App CRs" "$NON_BUNDLE_SELECTOR"

          # ============================================================
          # Phase 2: Bundle sub-App CRs in MC (kyverno, alloy-events, etc.)
          # ============================================================
          # Same treatment as Phase 1: pause + strip + delete. Bypassing
          # app-operator (via stripped finalizers) means it never asks the
          # WC's chart-operator to uninstall anything. The dangerous flow
          # is "bundle helm uninstall → DELETE on sub-App CR → app-operator
          # cleanup → WC Chart CR deletion → chart-operator helm uninstall".
          # Removing the sub-App CR ourselves with finalizer already stripped
          # eliminates that path.
          neutralize_apps_in_mc "2" "bundle sub-App CRs" "$SUB_APP_SELECTOR"

          # ============================================================
          # Phase 3: WC Chart CRs cleanup (direct + sub-app)
          # ============================================================
          # Now safe: every MC App CR that pointed at one of these Chart CRs
          # has been deleted in Phase 1 or Phase 2, so nothing on the MC side
          # will recreate them.
          echo "Phase 3: Cleaning up WC Chart CRs"
          neutralize_charts_in_wc "direct default app Chart CRs on WC" "$WC_CHART_DIRECT_SELECTOR"
          neutralize_charts_in_wc "bundle sub-app Chart CRs on WC" "$WC_CHART_SUBAPP_SELECTOR"

          # ============================================================
          # Phase 4: Bundle App CRs via operator cascade
          # ============================================================
          # Delete remaining bundle App CRs WITHOUT removing finalizers.
          # app-operator processes each deletion → cascade-deletes the MC
          # Chart CR → chart-operator on MC runs helm uninstall on the bundle
          # release. The bundle release manifest references the now-already-gone
          # sub-App CRs (Phase 2), so helm's DELETE returns 404 and continues.
          # Excludes app-operator and chart-operator.
          #
          # We wait for the cascade to complete before exiting. If we exited
          # earlier, the main chart upgrade would create new HelmRelease CRs
          # while the cascade was still uninstalling bundles, racing against
          # the new HRs.
          echo "Phase 4: Deleting bundle App CRs (operators will clean up MC Chart CRs)"

          REMAINING_APPS=$(kubectl get apps.application.giantswarm.io -n "$NAMESPACE" \
            -l "$CLUSTER_SELECTOR" \
            -o jsonpath='{.items[*].metadata.name}')
          BUNDLE_APPS=""
          for APP in $REMAINING_APPS; do
            is_operator "$APP" && continue
            echo "  Deleting bundle App CR: $APP"
            kubectl delete apps.application.giantswarm.io "$APP" -n "$NAMESPACE" \
              --ignore-not-found=true --wait=false
            BUNDLE_APPS="$BUNDLE_APPS $APP"
          done

          if [ -n "$BUNDLE_APPS" ]; then
            echo "Waiting for bundle App CR cascade deletion to complete..."
            TIMEOUT=300
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              ALL_GONE=true
              for APP in $BUNDLE_APPS; do
                if kubectl get apps.application.giantswarm.io "$APP" -n "$NAMESPACE" >/dev/null 2>&1; then
                  ALL_GONE=false
                  break
                fi
              done
              if [ "$ALL_GONE" = "true" ]; then
                echo "All bundle App CRs fully deleted after ${ELAPSED}s"
                break
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
            if [ "$ALL_GONE" != "true" ]; then
              echo "ERROR: Timed out waiting for bundle App CRs to be deleted after ${TIMEOUT}s"
              echo "Remaining bundle App CRs:"
              for APP in $BUNDLE_APPS; do
                kubectl get apps.application.giantswarm.io "$APP" -n "$NAMESPACE" --no-headers 2>/dev/null || true
              done
              exit 1
            fi
          fi

          echo "Migration hook completed successfully"
{{- end }}
