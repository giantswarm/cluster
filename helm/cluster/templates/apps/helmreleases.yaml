{{- $rootScope := . }}

{{- range $path, $_ := .Files.Glob "files/helmreleases/**.yaml" }}

{{- $app := dict }}
{{- with $rootScope }}

{{- /* Configure App values */}}
{{- $app := tpl (.Files.Get $path) $ | fromYaml }}
{{- $appName := $app.appName }}

{{- /* For hr installations targeting the MC, we want to add the cluster name as a prefix to the appName
to avoid naming conflicts in case of multiple clusters deployed in the same namespace.
*/}}
{{- $releaseName := $appName }}
{{- if $app.inCluster }}
{{- $releaseName = printf "%s-%s" (include "cluster.resource.name" $) $appName }}
{{- end }}
{{- $_ := set $ "appName" $appName }}
{{- $appKey := $app.configKey | default $appName }}

{{- /*
    Get provider-specific app config where we have:
    - name of Helm template that renders provider-specific Helm values for the app
    - flag that indicates if the app is enabled for the provider
*/}}
{{- $providerIntegrationAppConfig := dict }}
{{- $providerIntegrationAppConfigRaw := get $.Values.providerIntegration.apps $appKey }}
{{- if $providerIntegrationAppConfigRaw }}
{{- /* Sometimes, when provider app config is not set, $providerIntegrationAppConfigRaw gets parsed as an empty string,
       and sometimes as an empty dict. And we want $providerIntegrationAppConfigRaw, which is used in template, to be
       always a dict, for the sake of cleaner template code.
*/}}
{{- $providerIntegrationAppConfig = $providerIntegrationAppConfigRaw }}
{{- end }}


{{- /*
    Get (optional) ephemeral app config where we have:
    - flag that indicates if the app is enabled or not
    - version override
*/}}
{{- $ephemeralConfig := dict }}
{{- if ($.Values.internal.ephemeralConfiguration).apps }}
{{- $ephemeralConfigRaw := get $.Values.internal.ephemeralConfiguration.apps $appKey }}
{{- if $ephemeralConfigRaw }}
{{- /* Sometimes, when ephemeral config is not set, $ephemeralConfigRaw gets parsed as an empty string,
       and sometimes as an empty dict. And we want $ephemeralConfig, which is used in template, to be
       always a dict, for the sake of cleaner template code.
*/}}
{{- $ephemeralConfig = $ephemeralConfigRaw }}
{{- end }}
{{- end }}

{{- /* Determine if the App CR should be rendered or not */}}
{{- /* Cluster chart */}}
{{- $shouldRenderApp := not (or $app.disable $ephemeralConfig.disable) }}
{{- /* Provider chart */}}
{{- $shouldRenderApp = and $shouldRenderApp $providerIntegrationAppConfig.enable }}
{{- /* Releases */}}
{{- $shouldRenderApp = and $shouldRenderApp (or (not $.Values.providerIntegration.useReleases) (include "cluster.app.in-release" $ | eq "true")) }}

{{- if $shouldRenderApp }}
{{- $appVersion := $app.version -}}
{{- if $.Values.providerIntegration.useReleases }}
{{- $appVersion = include "cluster.app.version" $ }}
{{- end }}
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: {{ include "cluster.resource.name" $ }}-{{ $appName }}
  namespace: {{ $.Release.Namespace }}
  {{- $annotations := include "cluster.annotations.common.all" $ }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | indent 4 }}
  {{- end }}
  labels:
    {{- include "cluster.labels.common.all" $ | nindent 4 }}
spec:
  url: oci://gsoci.azurecr.io/charts/giantswarm/{{ $app.chartName | default $app.appName }}
  ref:
    tag: {{ $ephemeralConfig.versionOverride | default $appVersion | quote }}
  interval: 24h
  timeout: 60s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ include "cluster.resource.name" $ }}-{{ $appName }}
  namespace: {{ $.Release.Namespace }}
  {{- $combinedAnnotations := (include "cluster.annotations.common.all" $ | fromYaml) | default dict -}}
  {{- $additional := $app.additionalAnnotations | default dict -}}
  {{- $combinedAnnotations = merge $combinedAnnotations $additional -}}
  {{- if $combinedAnnotations }}
  annotations:
    {{- toYaml $combinedAnnotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "cluster.labels.common.all" $ | nindent 4 }}
spec:
  releaseName: {{ $releaseName | trunc 53 | trimSuffix "-" }}
  {{- if $app.inCluster }}
  targetNamespace: {{ $.Release.Namespace }}
  storageNamespace: {{ $.Release.Namespace }}
  {{- else }}
  targetNamespace: {{ $app.namespace }}
  storageNamespace: {{ $app.namespace }}
  {{- end }}
  chartRef:
    kind: OCIRepository
    name: {{ include "cluster.resource.name" $ }}-{{ $appName }}
  {{- $dependencies := list }}
  {{- if $.Values.providerIntegration.useReleases }}
  {{- $dependencies = include "cluster.app.dependencies" $ | fromYamlArray }}
  {{- else if $app.dependsOn }}
  {{- $dependencies = $app.dependsOn }}
  {{- end }}
  {{- if $dependencies }}
  dependsOn:
  {{- range $_, $dependency := $dependencies }}
  - name: {{ include "cluster.resource.name" $ }}-{{ $dependency }}
    namespace: {{ $.Release.Namespace }}
  {{- end }}
  {{- end }}
  {{- if $app.inCluster }}
  serviceAccountName: automation
  {{- else }}
  kubeConfig:
    secretRef:
      name: {{ include "cluster.resource.name" $ }}-kubeconfig
  {{- end }}
  interval: {{ $app.interval | default "5m" }}
  timeout: {{ $app.timeout | default "5m" }}
  install:
    {{- if $app.createNamespace }}
    createNamespace: true
    {{- end }}
    remediation:
      {{- if hasKey $app "remediationRetries" }}
      retries: {{ $app.remediationRetries }}
      {{- else }}
      retries: -1
      {{- end }}
  upgrade:
    disableWait: {{ $app.disableWait | default false }}
    remediation:
      retries: -1
      remediateLastFailure: false
  {{- if $app.driftDetection }}
  driftDetection:
    mode: {{ $app.driftDetection }}
  {{- end }}
  {{- /* We have multiple layers of app Helm values, where every next layer overwrites the previous one. */}}
  {{- /* Layer 1: default provider-independent app Helm values */}}
  {{- $appHelmValues := $app.defaultValues | default dict -}}
  {{- /* Layer 2: default provider-specific Helm values */}}
  {{- if $providerIntegrationAppConfig.configTemplateName }}
  {{- $providerSpecificDefaultValues := (include $providerIntegrationAppConfig.configTemplateName $) | fromYaml -}}
  {{- $appHelmValues = mergeOverwrite $appHelmValues $providerSpecificDefaultValues -}}
  {{- end }}
  {{- /* Layer 3: custom user config */}}
  {{- $userConfig := dict }}
  {{- $userConfigRaw := get $.Values.global.apps $appKey }}
  {{- if $userConfigRaw }}
  {{- $userConfig = $userConfigRaw | toYaml | toString | fromYaml }}
  {{- end }}
  {{- if $userConfig.values }}
  {{- $appHelmValues = mergeOverwrite $appHelmValues (deepCopy $userConfig.values) -}}
  {{- end }}
  {{- /* App platform honoured a `priority` (1-150, default 25) on each extraConfig that
         fixed its merge position relative to the cluster config (slot 50) and user config
         (slot 100) layers, and merged all configMaps before all secrets (secret always wins).
         Flux merges `valuesFrom` strictly in list order, so we emit a single list sorted to
         reproduce that order — see the `cluster.app.sortedValuesFrom` helper. The merged
         default+provider+user values are delivered through the user-config slot as a
         ConfigMap (not inline `spec.values`, which Flux always merges last and which no
         valuesFrom entry could override). */}}
  {{- $extraConfigs := concat ($app.extraConfigs | default list) ($userConfig.extraConfigs | default list) }}
  {{- $userValuesConfigMap := "" }}
  {{- if $appHelmValues }}
  {{- $userValuesConfigMap = printf "%s-%s-user-values" (include "cluster.resource.name" $) $appName }}
  {{- end }}
  {{- $sortArgs := dict
        "extraConfigs" $extraConfigs
        "clusterValuesConfigMap" (($app.clusterValues).configMap | default false | ternary (printf "%s-cluster-values" (include "cluster.resource.name" $)) "")
        "clusterValuesSecret" (($app.clusterValues).secret | default false | ternary (printf "%s-cluster-values" (include "cluster.resource.name" $)) "")
        "userValuesConfigMap" $userValuesConfigMap
        "root" $ }}
  {{- $sortedValuesFrom := include "cluster.app.sortedValuesFrom" $sortArgs | fromYamlArray }}
  {{- if $sortedValuesFrom }}
  valuesFrom:
  {{- range $entry := $sortedValuesFrom }}
  - kind: {{ $entry.kind }}
    name: {{ $entry.name }}
    valuesKey: values
    optional: {{ $entry.optional }}
  {{- end }}
  {{- end }}
{{- if $userValuesConfigMap }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $userValuesConfigMap }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cluster.labels.common.all" $ | nindent 4 }}
data:
  values: |
    {{- (tpl ($appHelmValues | toYaml | toString) $) | nindent 4 }}
{{- end }}
{{- /* end if $shouldRenderApp */}}
{{- end }}
{{- /* end with $rootScope */}}
{{- end }}
{{- /* end outer range */}}
{{- end }}
