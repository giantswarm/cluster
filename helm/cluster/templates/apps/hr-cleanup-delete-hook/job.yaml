{{/*
Pre-delete hook that force-cleans HelmReleases targeting the workload cluster
before the WC control plane is torn down — and deliberately leaves
HelmReleases targeting the management cluster alone.

WHY this hook exists at all (the WC-targeted case):

When a cluster App CR is deleted, the subsequent `helm uninstall <cluster>`
cascades through the manifests it rendered and issues `kubectl delete` on
every HelmRelease. Each HR carries `finalizers.fluxcd.io`, so K8s holds
it in `Terminating` until helm-controller runs `helm uninstall` on the
underlying release and clears the finalizer.

For HRs that target the WORKLOAD cluster (`spec.kubeConfig.secretRef`
set so helm-controller talks to the WC apiserver), the WC tear-down races
helm-controller. With 40+ such HRs and a fast CAPI tear-down, the WC
apiserver disappears before helm-controller finishes uninstalling all of
them — the remaining HRs are stuck in `Terminating` with the Flux
finalizer indefinitely, blocking CAPI cluster garbage collection.

This hook unblocks that path FOR WC-TARGETED HRs ONLY: suspend each HR
(so Flux stops re-adding the finalizer), strip the finalizer, then delete
the HR. The WC-side helm release storage is never formally uninstalled,
but that's fine — the WC is being torn down anyway and its helm storage
goes with it.

WHY we deliberately DO NOT touch MC-targeted HRs:

Bundle HelmReleases (security-bundle, observability-bundle, aws-nth-bundle,
karpenter-bundle, aws-ebs-csi-driver-bundle) and their sub-HRs that
target the MC (notably aws-nth-crossplane-resources,
cert-manager-crossplane-resources, cilium-crossplane-resources) all have
`spec.kubeConfig` empty. Their helm release storage and the manifests
they render live on the MC, not the WC.

For these, helm-controller can reach the MC apiserver throughout the
cluster delete, so `helm uninstall` against their MC-side release runs
cleanly. Critically, the manifests those releases create include
Crossplane CRs (`Role`, `Queue`, ...) that map 1:1 to AWS IAM roles and
SQS queues. Stripping the finalizer would skip `helm uninstall`, leaving
those Crossplane CRs in place, so Crossplane never gets the deletion
event for the AWS-side resources — silently leaking IAM roles and SQS
queues on every cluster delete.

So MC-targeted HRs are deliberately left alone. The subsequent
`helm uninstall <cluster>` deletes them in the normal way; helm-controller
picks each up via the Flux finalizer, runs `helm uninstall` on the
MC-side release, removes the finalizer; the parent `helm uninstall`
waits (default `--wait=true`) for the cascade to finish.

Trade-off: if helm-controller is wedged, the cluster delete blocks on
the MC-side cascade. That's a much better failure mode than silently
leaking AWS resources — it's loud, rare, observable, and the fix is to
unstick helm-controller and retry.

NOTE on OCIRepositories:

A previous version of this hook had a Step 4 that stripped finalizers
from OCIRepositories and force-deleted them. That was needed because the
old code force-deleted bundle HRs without letting helm-controller run
`helm uninstall`, which orphaned the OCIRepositories the bundle releases
had rendered. Now that we let bundle HRs go through helm-controller's
normal uninstall path, each bundle's `helm uninstall` removes its
rendered OCIRepositories naturally, and OCIRepositories rendered
directly by cluster-aws are removed by the parent `helm uninstall`
itself. Step 4 is no longer needed.
*/}}
{{- if $.Values.providerIntegration.apps }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cluster.resource.name" $ }}-cleanup-hrs
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cluster.labels.common.all" $ | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "cluster.labels.common.all" $ | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cluster.resource.name" $ }}-cleanup-hrs
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 100Mi
      containers:
      - name: kubectl
        image: gsoci.azurecr.io/giantswarm/docker-kubectl:1.36.2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        env:
        # Since we are using `readOnlyRootFilesystem: true`, this moves the cache directory to the `emptyDir` mount to keep the performance improvement.
        - name: KUBECACHEDIR
          value: /tmp/.kube/cache
        - name: CLUSTER_NAME
          value: {{ include "cluster.resource.name" $ }}
        - name: NAMESPACE
          value: {{ $.Release.Namespace }}
        - name: BATCH_SIZE
          value: "10"
        command:
        - /bin/sh
        args:
        - -c
        - |
          set -eu

          echo "Cleaning up WC-targeted HelmReleases for cluster ${CLUSTER_NAME}"

          # Discover every HR labeled with our cluster, paired with its
          # `spec.kubeConfig.secretRef.name`. The presence of that field is
          # how we tell WC-targeted (helm-controller talks to the WC apiserver
          # via that kubeconfig secret) from MC-targeted (field empty,
          # helm-controller talks to the MC). See the file header for why
          # we only act on the WC set.
          helmrelease_pairs="$(kubectl get helmreleases.helm.toolkit.fluxcd.io --namespace "${NAMESPACE}" --selector giantswarm.io/cluster="${CLUSTER_NAME}" --output jsonpath='{ range .items[*] }{ .metadata.name }|{ .spec.kubeConfig.secretRef.name }{ "\n" }{ end }' 2> /dev/null || :)"

          # WC-targeted: secretRef.name non-empty.
          wc_helmreleases="$(echo "${helmrelease_pairs}" | awk -F "|" 'NF==2 && $2 != "" {print $1}')"
          wc_helmreleases_count=$(echo "${wc_helmreleases}" | grep -c . || :)
          echo "  WC-targeted: ${wc_helmreleases_count} (force-cleaned by this hook)"

          # MC-targeted: secretRef.name empty.
          mc_helmreleases="$(echo "${helmrelease_pairs}" | awk -F "|" 'NF==2 && $2 == "" {print $1}')"
          mc_helmreleases_count=$(echo "${mc_helmreleases}" | grep -c . || :)
          echo "  MC-targeted: ${mc_helmreleases_count} (left for helm-controller to uninstall normally)"

          if [ ${wc_helmreleases_count} -eq 0 ]
          then
            echo "No WC-targeted HelmReleases found; nothing to do."
            exit 0
          fi

          # Step 1: Suspend WC-targeted HRs to stop Flux from reconciling them.
          # This prevents Flux from re-adding the finalizer after we remove it
          # in Step 2.
          echo "  Step 1: Suspending WC-targeted HelmReleases"
          count=0
          for wc_helmrelease in ${wc_helmreleases}
          do
            (kubectl patch helmreleases.helm.toolkit.fluxcd.io --namespace "${NAMESPACE}" "${wc_helmrelease}" --type merge --patch '{ "spec": { "suspend": true } }' 2> /dev/null || :) &
            count=$((count + 1))

            if [ $((count % BATCH_SIZE)) -eq 0 ]
            then
              wait
            fi
          done

          wait

          # Brief pause to let in-flight reconciliations complete before
          # removing finalizers, reducing the chance of Flux re-adding them.
          sleep 5

          # Step 2: Remove finalizers from WC-targeted HRs. Two passes to handle
          # the race where an in-flight reconciliation re-adds the finalizer
          # after suspend lands.
          for pass in 1 2
          do
            echo "  Step 2 pass ${pass}: Removing finalizers from WC-targeted HelmReleases"
            count=0
            for wc_helmrelease in ${wc_helmreleases}
            do
              (kubectl patch helmreleases.helm.toolkit.fluxcd.io --namespace "${NAMESPACE}" "${wc_helmrelease}" --type json --patch '[{ "op": "remove", "path": "/metadata/finalizers" }]' 2> /dev/null || :) &
              count=$((count + 1))

              if [ $((count % BATCH_SIZE)) -eq 0 ]
              then
                wait
              fi
            done

            wait

            [ "${pass}" -ne 2 ] && sleep 3
          done

          # Step 3: Delete WC-targeted HRs. With suspend + no finalizer, this
          # is instant. We deliberately do NOT delete MC-targeted HRs here —
          # they are deleted by the subsequent `helm uninstall <cluster>`,
          # with helm-controller running `helm uninstall` against each
          # MC-side release in the normal way (header explains why).
          echo "  Step 3: Deleting WC-targeted HelmReleases"
          count=0
          for wc_helmrelease in ${wc_helmreleases}
          do
            (kubectl delete helmreleases.helm.toolkit.fluxcd.io --namespace "${NAMESPACE}" "${wc_helmrelease}" --wait=false 2> /dev/null || :) &
            count=$((count + 1))

            if [ $((count % BATCH_SIZE)) -eq 0 ]
            then
              wait
            fi
          done

          wait

          echo "Processed ${count} WC-targeted HelmReleases for cluster ${CLUSTER_NAME}"
          echo "Leaving ${mc_helmreleases_count} MC-targeted HelmReleases for helm-controller-driven uninstall."
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 512Mi
      restartPolicy: Never
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
{{- end }}
