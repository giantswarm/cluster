appName: external-dns
chartName: external-dns-app
configKey: externalDns
dependsOn: prometheus-operator-crd
namespace: kube-system
# used by renovate
# repo: giantswarm/external-dns-app
version: 3.4.0
defaultValues:
  provider: {{ .Values.providerIntegration.provider }}
  domainFilters:
  - {{ include "cluster.internal.apps.baseDomain" . }}
  txtOwnerId: giantswarm-io-external-dns
  txtPrefix: {{ $.Values.global.metadata.name }}
  registry: txt
  annotationFilter: giantswarm.io/external-dns=managed
  ciliumNetworkPolicy:
    enabled: true
  {{- if .Values.global.connectivity.proxy.enabled }}
  env:
    - name: NO_PROXY
      value: {{ include "cluster.connectivity.proxy.noProxy" (dict "global" .Values.global "providerIntegration" .Values.providerIntegration) | quote }}
    - name: HTTP_PROXY
      value: {{ .Values.global.connectivity.proxy.httpProxy | quote }}
    - name: HTTPS_PROXY
      value: {{ .Values.global.connectivity.proxy.httpsProxy | quote }}
  {{- end }}
