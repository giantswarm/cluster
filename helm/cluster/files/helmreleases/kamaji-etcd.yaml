appName: kamaji-etcd
catalog: default
configKey: kamajiEtcd
additionalAnnotations:
  helm.sh/resource-policy: "keep"
interval: 1m
prependClusterName: true
namespace: {{ $.Release.Namespace }}
# used by renovate
# repo: giantswarm/kamaji-etcd-app
version: 0.3.0
disable: {{ not (eq (include "kamaji.isEnabled" $) "true") }}
defaultValues:
  # For all available values see https://github.com/giantswarm/kamaji-etcd-app/blob/main/helm/kamaji-etcd/values.yaml
  persistentVolumeClaim:
    retentionPolicyWhenDeleted: "Delete"
  datastore:
    name: {{ include "cluster.resource.name" $ }}
