appName: cluster-autoscaler
chartName: cluster-autoscaler-app
configKey: clusterAutoscaler
inCluster: {{ eq $.Values.providerIntegration.provider "azure" }}
dependsOn: {{ if not (eq $.Values.providerIntegration.provider "azure") }}["kyverno-crds"]{{ else }}[]{{ end }}
namespace: kube-system
# used by renovate
# repo: giantswarm/cluster-autoscaler-app
version: 2.0.3
defaultValues:
  clusterID: {{ include "cluster.resource.name" $ }}
  provider: {{ .Values.providerIntegration.provider }}
  {{- if .Values.global.connectivity.proxy.enabled }}
  cluster:
    proxy:
      noProxy: {{ .Values.global.connectivity.proxy.noProxy | quote }}
      http: {{ .Values.global.connectivity.proxy.httpProxy | quote }}
      https: {{ .Values.global.connectivity.proxy.httpsProxy | quote }}
  {{- end }}
